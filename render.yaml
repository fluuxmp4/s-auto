services:
  - type: web
    name: s-auto
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: NODE_ENV
        value: production
      - key: MANAGER_USER
        value: gerant
      - key: MANAGER_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
